# Warm Rust/Cargo caches on master so tag-triggered Release jobs can restore them.
# GitHub Actions caches are scoped by ref: tag runs cannot reuse caches saved by
# other tags, but they CAN fall back to caches from the default branch.

name: Cache Warm

on:
  push:
    branches:
      - master
    paths:
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/cache-warm.yml"
  workflow_dispatch:

jobs:
  # Keep the same matrix shape as Release so each platform warms its shared cache.
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            cache_key: macos-aarch64
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            cache_key: macos-x86_64
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            cache_key: windows
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          # Must match Release so tag runs can restore this default-branch cache.
          shared-key: ${{ matrix.cache_key }}
          save-if: ${{ github.ref == 'refs/heads/master' }}
          cache-on-failure: true

      - run: pnpm install --frozen-lockfile

      # Match Release's compile path (tauri-action), but skip packaging installers.
      - name: Compile with tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build --no-bundle ${{ matrix.args }}
