# Warm Rust/Cargo caches on master so tag-triggered Release jobs can restore them.
# GitHub Actions caches are scoped by ref: tag runs cannot reuse caches saved by
# other tags, but they CAN fall back to caches from the default branch.

name: Cache Warm

on:
  push:
    branches:
      - master
    paths:
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cache-warm.yml"
  workflow_dispatch:

jobs:
  # Job name must stay "publish" to match release.yml — rust-cache includes the
  # job name in the cache key, so a mismatch defeats restore fallback.
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          # Distinguish the two macOS targets that share the same runner OS.
          key: ${{ matrix.args }}
          cache-on-failure: true

      - run: npm ci

      # Match Release's compile path (tauri-action), but skip packaging installers.
      - name: Compile with tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --no-bundle ${{ matrix.args }}
