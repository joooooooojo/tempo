<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Hello 示例插件</title>
    <!--
      The host's baseline CSP (script-src 'self') blocks inline scripts, so everything lives
      in index.js — served from the same tempo-plugin:// origin as this document.
    -->
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: Canvas;
        color: CanvasText;
      }
      h1 {
        font-size: 15px;
        margin: 0;
      }
      p {
        margin: 0;
        font-size: 12px;
        opacity: 0.7;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        padding: 6px 8px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        background: transparent;
        color: inherit;
      }
      button {
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 6px;
        border: none;
        background: #4f46e5;
        color: white;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #log {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        opacity: 0.8;
        min-height: 40px;
      }
      #theme {
        font-size: 11px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h1>Hello 示例插件</h1>
    <p id="theme">主题：加载中…</p>
    <div class="row">
      <input id="who" type="text" placeholder="你的名字" value="Tempo" />
      <button id="go">打招呼（Runtime）</button>
    </div>
    <div id="log"></div>
    <script src="./index.js"></script>
  </body>
</html>
