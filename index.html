<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f3f8f5;
        color: #24352c;
        font-family: ui-sans-serif, system-ui, "Plus Jakarta Sans", sans-serif;
      }

      html.dark,
      html.dark body {
        background: #12151a;
        color: #e8edf2;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse 70% 55% at 50% 38%, rgba(74, 222, 128, 0.22), transparent 62%),
          radial-gradient(ellipse 50% 40% at 78% 18%, rgba(45, 212, 191, 0.12), transparent 55%),
          #f3f8f5;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      html.dark #boot-splash {
        background:
          radial-gradient(ellipse 70% 55% at 50% 38%, rgba(74, 222, 128, 0.12), transparent 62%),
          radial-gradient(ellipse 50% 40% at 78% 18%, rgba(45, 212, 191, 0.08), transparent 55%),
          #12151a;
      }

      #boot-splash.is-leaving {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        user-select: none;
      }

      .boot-ring {
        position: relative;
        width: 72px;
        height: 72px;
      }

      .boot-ring::before,
      .boot-ring::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .boot-ring::before {
        border: 2px solid rgba(36, 53, 44, 0.1);
      }

      html.dark .boot-ring::before {
        border-color: rgba(232, 237, 242, 0.1);
      }

      .boot-ring::after {
        border: 2px solid transparent;
        border-top-color: #4ade80;
        border-right-color: rgba(74, 222, 128, 0.35);
        animation: boot-spin 0.9s linear infinite;
      }

      .boot-core {
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: linear-gradient(145deg, #86efac, #4ade80 55%, #2dd4bf);
        box-shadow: 0 10px 28px rgba(74, 222, 128, 0.28);
      }

      .boot-core span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 3px;
        height: 14px;
        border-radius: 999px;
        background: rgba(21, 40, 30, 0.78);
        transform-origin: center 12px;
      }

      .boot-core span:first-child {
        transform: translate(-50%, -12px) rotate(0deg);
      }

      .boot-core span:last-child {
        height: 10px;
        transform: translate(-50%, -12px) rotate(90deg);
        opacity: 0.7;
      }

      .boot-word {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .boot-caption {
        margin: 0;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(36, 53, 44, 0.48);
      }

      html.dark .boot-caption {
        color: rgba(232, 237, 242, 0.45);
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-ring::after {
          animation: none;
          border-top-color: #4ade80;
          border-right-color: #4ade80;
          opacity: 0.7;
        }
      }
    </style>
    <script>
      (function () {
        var view = new URLSearchParams(location.search).get("view");
        var root = document.documentElement;

        if (view === "command-palette" || view === "pomodoro-float" || view === "shelf-picker" || view === "clipboard-picker" || view === "snippet-picker") {
          var isMac = /Mac|iPhone|iPod|iPad/i.test(navigator.platform || navigator.userAgent || "");
          root.style.background = view === "command-palette" && !isMac ? "#f7f9f8" : "transparent";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          root.classList.toggle("dark", prefersDark);
          if (view === "shelf-picker" || view === "clipboard-picker" || view === "snippet-picker") {
            root.classList.add("shelf-picker-window");
            root.classList.add(isMac ? "shelf-picker-window--mac" : "shelf-picker-window--css-shadow");
            document.body.style.background = "transparent";
            document.body.classList.add("shelf-picker-window");
          }
          document.addEventListener("DOMContentLoaded", function () {
            var splash = document.getElementById("boot-splash");
            if (splash) splash.remove();
          });
          return;
        }

        if (view === "eye-care") {
          root.style.background = "#effbf4";
          root.classList.remove("dark");
          document.addEventListener("DOMContentLoaded", function () {
            var splash = document.getElementById("boot-splash");
            if (splash) splash.remove();
          });
          return;
        }

        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        root.classList.toggle("dark", prefersDark);
      })();
    </script>
    <!-- Non-blocking fonts: do not delay first splash paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
  </head>
  <body>
    <div id="boot-splash" aria-busy="true" aria-live="polite">
      <div class="boot-mark">
        <div class="boot-ring" aria-hidden="true">
          <div class="boot-core">
            <span></span>
            <span></span>
          </div>
        </div>
        <p class="boot-word">Tempo</p>
        <p class="boot-caption">正在启动</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Main window stays hidden; entry is the command palette (tray / shortcut).
      (function () {
        var view = new URLSearchParams(location.search).get("view");
        if (view) return;

        document.addEventListener("DOMContentLoaded", function () {
          var splash = document.getElementById("boot-splash");
          if (splash) {
            splash.classList.add("is-leaving");
            window.setTimeout(function () {
              splash.remove();
            }, 240);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
