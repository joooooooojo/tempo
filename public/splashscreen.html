<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f3f8f5;
        color: #24352c;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #12151a;
          color: #e8edf2;
        }
      }

      .splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse 70% 55% at 50% 38%, rgba(74, 222, 128, 0.22), transparent 62%),
          radial-gradient(ellipse 50% 40% at 78% 18%, rgba(45, 212, 191, 0.12), transparent 55%),
          #f3f8f5;
      }

      @media (prefers-color-scheme: dark) {
        .splash {
          background:
            radial-gradient(ellipse 70% 55% at 50% 38%, rgba(74, 222, 128, 0.12), transparent 62%),
            radial-gradient(ellipse 50% 40% at 78% 18%, rgba(45, 212, 191, 0.08), transparent 55%),
            #12151a;
        }
      }

      .mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        user-select: none;
      }

      .ring {
        position: relative;
        width: 72px;
        height: 72px;
      }

      .ring::before,
      .ring::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .ring::before {
        border: 2px solid rgba(36, 53, 44, 0.1);
      }

      @media (prefers-color-scheme: dark) {
        .ring::before {
          border-color: rgba(232, 237, 242, 0.1);
        }
      }

      .ring::after {
        border: 2px solid transparent;
        border-top-color: #4ade80;
        border-right-color: rgba(74, 222, 128, 0.35);
        animation: spin 0.9s linear infinite;
      }

      .core {
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: linear-gradient(145deg, #86efac, #4ade80 55%, #2dd4bf);
        box-shadow: 0 10px 28px rgba(74, 222, 128, 0.28);
      }

      .core span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 3px;
        height: 14px;
        border-radius: 999px;
        background: rgba(21, 40, 30, 0.78);
        transform-origin: center 12px;
      }

      .core span:first-child {
        transform: translate(-50%, -12px) rotate(0deg);
      }

      .core span:last-child {
        height: 10px;
        transform: translate(-50%, -12px) rotate(90deg);
        opacity: 0.7;
      }

      .word {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .caption {
        margin: 0;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(36, 53, 44, 0.48);
      }

      @media (prefers-color-scheme: dark) {
        .caption {
          color: rgba(232, 237, 242, 0.45);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .ring::after {
          animation: none;
          border-top-color: #4ade80;
          border-right-color: #4ade80;
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" aria-busy="true" aria-live="polite">
      <div class="mark">
        <div class="ring" aria-hidden="true">
          <div class="core">
            <span></span>
            <span></span>
          </div>
        </div>
        <p class="word">Tempo</p>
        <p class="caption">正在启动</p>
      </div>
    </div>
  </body>
</html>
